<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <!-- CRT screen background -->
  <rect width="32" height="32" rx="4" fill="#0a0a0a"/>
  <!-- Screen bezel -->
  <rect x="2" y="2" width="28" height="28" rx="3" fill="#0f1a0f" stroke="#2a4a2a" stroke-width="1"/>
  <!-- Phosphor green "L" for LegacyLens, pixel-style -->
  <rect x="8"  y="7"  width="4" height="14" fill="#33ff33"/>
  <rect x="8"  y="17" width="12" height="4"  fill="#33ff33"/>
  <!-- Lens circle / magnifier -->
  <circle cx="21" cy="11" r="5" fill="none" stroke="#33ff33" stroke-width="2"/>
  <line x1="25" y1="15" x2="28" y2="18" stroke="#33ff33" stroke-width="2" stroke-linecap="round"/>
  <!-- CRT scanline overlay (subtle) -->
  <rect x="2" y="2" width="28" height="28" rx="3" fill="url(#scan)" opacity="0.15"/>
  <defs>
    <pattern id="scan" width="1" height="3" patternUnits="userSpaceOnUse">
      <rect width="1" height="1" fill="#000"/>
    </pattern>
  </defs>
</svg>
